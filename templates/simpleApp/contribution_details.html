
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل السهم</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body{
            background-color: #f8f9fa;
        }

        .details-card{
            border: none;
            border-radius: 20px;
        }

        .info-box{
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9">

            <div class="card details-card shadow-lg">
                <div class="card-body p-5">

                    <!-- العنوان -->
                    <div class="text-center mb-5">
                        <div class="bg-success bg-opacity-10 d-inline-flex p-3 rounded-circle">
                            <i class="bi bi-piggy-bank-fill text-success fs-2"></i>
                        </div>

                        <h2 class="fw-bold mt-3">
                            تفاصيل السهم
                        </h2>

                        <p class="text-muted">
                            معلومات المساهمة الخاصة بالمشروع.
                        </p>
                    </div>

                    <!-- البيانات -->
                    <div class="info-box mb-3">
                        <h6 class="text-muted mb-1">
                            <i class="bi bi-person-fill"></i>
                            اسم المساهم
                        </h6>
                        <h5>{{ contributionH }}</h5>
                    </div>

                    <div class="info-box mb-3">
                        <h6 class="text-muted mb-1">
                            <i class="bi bi-cash-stack"></i>
                            قيمة السهم
                        </h6>
                        <h5>{{ contributionH.amount }}</h5>
                    </div>

                    <div class="info-box mb-4">
                        <h6 class="text-muted mb-1">
                            <i class="bi bi-folder-fill"></i>
                            المشروع
                        </h6>
                        <h5>{{ contributionH.project }}</h5>
                    </div>

                    <!-- الأزرار -->
                    <div class="d-flex justify-content-center gap-3">

                        <a href="{% url 'edit_contribution' contributionH.id %}"
                           class="btn btn-warning">
                            <i class="bi bi-pencil-square"></i>
                            تعديل
                        </a>

                        <a href="{% url 'delete_contribution' contributionH.id %}"
                           class="btn btn-danger"
                           onclick="return confirm('هل أنت متأكد من حذف هذا السهم؟')">
                            <i class="bi bi-trash"></i>
                            حذف
                        </a>

                        <a href="{% url 'contributions' %}"
                           class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-right"></i>
                            رجوع
                        </a>

                    </div>

                </div>
            </div>

        </div>

    </div>

</div>


</body>
</html>
