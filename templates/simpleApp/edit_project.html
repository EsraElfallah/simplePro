
{%extends 'base.html'%}
{%block title%}تعديل المشروع{%endblock%}
{%block content%}
<style>
    body{
        background-color: #f8f9fa;
    }

    .edit-card{
        border: none;
        border-radius: 20px;
    }
</style>


<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9">

            <div class="card edit-card shadow-lg">
                <div class="card-body p-5">

                    <!-- العنوان -->
                    <div class="text-center mb-5">
                        <div class="bg-warning bg-opacity-25 d-inline-flex p-3 rounded-circle">
                            <i class="bi bi-pencil-square text-warning fs-2"></i>
                        </div>

                        <h2 class="fw-bold mt-3">
                            تعديل المشروع
                        </h2>

                        <p class="text-muted">
                            قم بتعديل بيانات المشروع ثم اضغط على حفظ التعديل.
                        </p>
                    </div>

                    <!-- الفورم -->
                    <form method="post">
                        {% csrf_token %}

                        {{ form.as_p }}

                        <div class="d-flex justify-content-center gap-3 mt-4">

                            <button type="submit"
                                    class="btn btn-warning px-4">
                                <i class="bi bi-check-circle"></i>
                                حفظ التعديل
                            </button>

                            <a href="{% url 'projects' %}"
                               class="btn btn-outline-secondary px-4">
                                <i class="bi bi-arrow-right"></i>
                                رجوع
                            </a>

                        </div>

                    </form>

                </div>
            </div>

        </div>

    </div>

</div>
{%endblock%}
