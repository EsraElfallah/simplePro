{%extends 'base.html'%}
{%block title%}إضافة مشروع{%endblock%}

{%block content%}
<style>

    .project-card{
        border: none;
        border-radius: 20px;
    }
</style>


<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9">

            <div class="card project-card shadow-lg">
                <div class="card-body p-5">

                    <!-- العنوان -->
                    <div class="text-center mb-5">
                        <div class="bg-primary bg-opacity-10 d-inline-flex p-3 rounded-circle">
                            <i class="bi bi-folder-plus text-primary fs-2"></i>
                        </div>

                        <h2 class="fw-bold mt-3">
                            إضافة مشروع جديد
                        </h2>

                        <p class="text-muted">
                            قم بإدخال بيانات المشروع ثم اضغط على حفظ.
                        </p>
                    </div>

                    <!-- الفورم -->
                    <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">اسم المشروع</label>
                        {{ form.name }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">الوصف</label>
                        {{ form.project_details }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">الميزانية</label>
                        {{ form.budget }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">حالة المشروع</label>
                        {{ form.status }}
                    </div>

                    <div class="d-flex justify-content-center gap-3 mt-4">

                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-circle"></i>
                            حفظ المشروع
                        </button>

                        <a href="{% url 'projects' %}" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-arrow-right"></i>
                            رجوع
                        </a>

                    </div>

                </form>

                </div>
            </div>

        </div>

    </div>

</div>

{%endblock%}
