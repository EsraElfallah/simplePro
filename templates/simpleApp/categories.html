
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التصنيفات</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div class="container py-5">

    <!-- عنوان الصفحة -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1">
                <i class="bi bi-tags-fill text-primary"></i>
                إدارة التصنيفات
            </h2>
            <p class="text-muted mb-0">
                إضافة وتعديل وحذف التصنيفات الخاصة بالمشروع.
            </p>
        </div>

        <a href="{% url 'add_category' %}" class="btn btn-primary shadow-sm">
            <i class="bi bi-plus-circle"></i>
            إضافة تصنيف
        </a>
    </div>

    <!-- البطاقة -->
    <div class="card border-0 shadow-sm">
        <div class="card-body">

            <table class="table table-hover align-middle text-center">
                <thead class="table-primary">
                    <tr>
                        <th>#</th>
                        <th>اسم التصنيف</th>
                        <th width="250">الإجراءات</th>
                    </tr>
                </thead>

                <tbody>
                    {% for c in categoriesH %}
                    <tr>
                        <td>{{ forloop.counter }}</td>

                        <td class="fw-semibold">
                            {{ c }}
                        </td>

                        <td>
                            <div class="d-flex justify-content-center gap-2">

                                <a href="{% url 'edit_category' c.id %}"
                                   class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-pencil-square"></i>
                                    تعديل
                                </a>

                                <a href="{% url 'delete_category' c.id %}"
                                   class="btn btn-outline-danger btn-sm"
                                   onclick="return confirm('هل أنت متأكد من حذف هذا التصنيف؟')">
                                    <i class="bi bi-trash"></i>
                                    حذف
                                </a>

                            </div>
                        </td>
                    </tr>

                    {% empty %}
                    <tr>
                        <td colspan="3" class="py-4 text-muted">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                            لا توجد تصنيفات حالياً.
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
```
