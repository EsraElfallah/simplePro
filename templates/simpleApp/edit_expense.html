
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل المصروف</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body{
            background-color: #f8f9fa;
        }

        .expense-card{
            border: none;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9">

            <div class="card expense-card shadow-lg">
                <div class="card-body p-5">

                    <!-- العنوان -->
                    <div class="text-center mb-5">
                        <div class="bg-warning bg-opacity-25 d-inline-flex p-3 rounded-circle">
                            <i class="bi bi-pencil-square text-warning fs-2"></i>
                        </div>

                        <h2 class="fw-bold mt-3">
                            تعديل المصروف
                        </h2>

                        <p class="text-muted">
                            قم بتعديل بيانات المصروف ثم اضغط على حفظ التعديل.
                        </p>
                    </div>

                    <!-- الفورم -->
                    <form method="post">
                        {% csrf_token %}

                        {{ eform.as_p }}

                        <div class="d-flex justify-content-center gap-3 mt-4">

                            <button type="submit"
                                    class="btn btn-warning px-4">
                                <i class="bi bi-check-circle"></i>
                                حفظ التعديل
                            </button>

                            <a href="{% url 'expenses' %}"
                               class="btn btn-outline-secondary px-4">
                                <i class="bi bi-arrow-right"></i>
                                رجوع
                            </a>

                        </div>

                    </form>

                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
