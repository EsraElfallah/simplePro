{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <title>{% block title %}Simple App{% endblock %}</title>
</head>

<body style="background:#f5f7fb;">

<!-- 🔥 Navbar block -->
{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top">
    <div class="container">

        <a class="navbar-brand fw-bold fs-2 text-uppercase"
           href="{% url 'dashboard' %}">

            إدارة مالي
        </a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="{% url 'projects' %}">المشاريع</a>
            <a class="nav-link text-white" href="{% url 'expenses' %}">المصروفات</a>
            <a class="nav-link text-white" href="{% url 'contributions' %}">المساهمات</a>
            <a class="nav-link text-white" href="{% url 'categories' %}">التصنيفات</a>
            <a class="nav-link text-white" href="{% url 'contributers' %}">المساهمين</a>
        </div>

    </div>
</nav>
{% endblock %}

<!-- CONTENT -->
<div class="container py-5">
    {% block content %}
    {% endblock %}
</div>

<!-- FOOTER -->
<footer class="text-center text-secondary py-4 mt-5 border-top">
    SimplePro © 2026
</footer>

</body>
</html>
